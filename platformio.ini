; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Library source:  src/
; Examples:        examples/BelleIle_minimal/BelleIle_minimal.ino  (no WiFi — default, works in Arduino IDE & PlatformIO)
;                  examples/BelleIle_wifi/BelleIle_wifi.ino        (WiFi + NTP, works in Arduino IDE & PlatformIO)
;
; To build the WiFi example, change src_dir below to:
;   src_dir = examples/BelleIle_wifi

[platformio]
src_dir = examples/BelleIle_minimal

[env]
platform    = espressif32
board       = esp32dev
framework   = arduino
build_src_filter = +<*> +<../../src/*.cpp> +<../../src/stations/*.cpp>
build_flags      = -I ${PROJECT_SRC_DIR} -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations


