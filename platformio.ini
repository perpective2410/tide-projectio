  # RECOMMENDED
  # Accept new functionality in a backwards compatible manner and patches
  paulstoffregen/Time @ ^1.6.1
 
  paulstoffregen/OneWire @ ^2.3.8

  milesburton/DallasTemperature @ ^4.0.4

  iliaslamprou/VirtuinoCM @ ^1.0.2