; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Each environment builds a specific example sketch.
; Build with: pio run -e <environment>
;
; Available environments:
;   esp_wroom_02-usb  - BelleIle minimal (no WiFi, static date)
;   esp32wifi         - BelleIle WiFi + NTP example
;   m5stack_tab5      - M5Stack Tab5 TFT display example

[platformio]
; NOTE: When building different examples, change src_dir below:
;   src_dir = examples/BelleIle_minimal    (default - no WiFi)
;   src_dir = examples/BelleIle_wifi       (WiFi + NTP)
;   src_dir = examples/BelleIle_minimal     (M5Stack Tab5)
src_dir = examples/TFT_TideDisplay

; ── Common configuration for ESP32 boards ──────────────────────────────────────
[env]
platform    = espressif32
board       = esp32dev
framework   = arduino
build_src_filter = +<*> +<../../src/*.cpp> +<../../src/stations/*.cpp>
build_flags = -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations -I ${PROJECT_SRC_DIR}

; ── Minimal example (no WiFi, static date) ────────────────────────────────────
; Build with: pio run -e esp_wroom_02-usb
; Uses default src_dir from [platformio]
[env:esp_wroom_02-usb]
board = esp32dev
lib_deps =
  paulstoffregen/Time @ ^1.6.1

; ── WiFi + NTP example ────────────────────────────────────────────────────────
; Build with: pio run -e esp32wifi
; NOTE: Change src_dir in [platformio] to: examples/BelleIle_wifi
[env:esp32wifi]
board = esp32-p4-evboard
build_flags =
  ${env.build_flags}
  -I ${PROJECT_DIR}/examples/BelleIle_wifi
lib_deps =
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1

; ── M5Stack Tab5 (ESP32-P4, 1280×720 MIPI-DSI) ────────────────────────────────
; Requires pioarduino platform fork for ESP32-P4 support.
; Build with: pio run -e m5stack_tab5
; NOTE: Change src_dir in [platformio] to: examples/TFT_TideDisplay
; Update the release tag below to the latest at:
;   https://github.com/pioarduino/platform-espressif32/releases
; Note: does not work for version above #55.03.32
[env:m5stack_tab5]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.32
board = esp32-p4-evboard
upload_speed = 1500000
monitor_speed = 115200
build_flags =
  ${env.build_flags}
  -I ${PROJECT_DIR}/examples/TFT_TideDisplay
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
lib_deps =
  m5stack/M5Unified @ ^0.2.13
  m5stack/M5GFX @ ^0.2.19
  paulstoffregen/Time @ ^1.6.1


