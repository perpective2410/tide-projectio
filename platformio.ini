; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Library source:  src/
; Examples:        examples/BelleIle_minimal/BelleIle_minimal.ino  (no WiFi)
;                  examples/BelleIle_wifi/BelleIle_wifi.ino        (WiFi + NTP)
;                  examples/TFT_TideDisplay/TFT_TideDisplay.ino    (M5Stack Tab5)
;
; Each environment compiles its own example via build_src_filter.
; Build with:  pio run -e esp32mini   or   pio run -e esp32wifi

[platformio]
src_dir      = .
default_envs = esp32mini

; ── Minimal example (no WiFi, static date) ───────────────────────────────────
[env:esp32mini]
platform         = espressif32
board            = esp32dev
framework        = arduino
build_src_filter = -<*> +<examples/BelleIle_minimal/*.cpp> +<src/*.cpp> +<src/stations/LePalais.cpp> +<src/stations/Brest.cpp> +<src/stations/StationRegistry.cpp>
build_flags      = -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations
lib_deps =
  paulstoffregen/Time @ ^1.6.1


; ── WiFi + NTP example ───────────────────────────────────────────────────────
[env:esp32wifi]
platform         = espressif32
board            = esp32dev
framework        = arduino
build_src_filter = -<*> +<examples/BelleIle_wifi/*.cpp> +<src/*.cpp> +<src/stations/LePalais.cpp> +<src/stations/Brest.cpp> +<src/stations/StationRegistry.cpp>
build_flags      = -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations
lib_deps =
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1

; ── M5Stack Tab5 (ESP32-P4, 1280×720 MIPI-DSI) ───────────────────────────────
; Requires pioarduino platform fork for ESP32-P4 support.
; Update the release tag below to the latest at:
;   https://github.com/pioarduino/platform-espressif32/releases
[env:m5stack_tab5]
platform         = espressif32
framework = arduino
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
build_src_filter = -<*> +<examples/TFT_TideDisplay/*.cpp> +<src/*.cpp> +<src/stations/LePalais.cpp> +<src/stations/Brest.cpp> +<src/stations/StationRegistry.cpp>
build_flags      =
  -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=5
  -DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
lib_deps =
  m5stack/M5Unified @ ^0.2.13
  m5stack/M5GFX @ ^0.2.19 
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1
