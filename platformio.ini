; ── M5Stack Tab5 (ESP32-P4, 1280×720 MIPI-DSI) ───────────────────────────────
; Requires pioarduino platform fork for ESP32-P4 support.
; Update the release tag below to the latest at:
;   https://github.com/pioarduino/platform-espressif32/releases
; does not work for version above #53.03.10
[env:m5stack_tab5]
platform = https://github.com/pioarduino/platform-espressif32.git#53.03.10
upload_speed = 1500000
monitor_speed = 115200
build_type = debug
framework = arduino
board = esp32-p4-evboard
board_build.mcu = esp32p4
board_build.flash_mode = qio
build_src_filter =
  -<*> 
  +<examples/TFT_TideDisplay/*.cpp> 
  +<src/*.cpp> 
  +<src/stations/LePalais.cpp> 
  +<src/stations/Brest.cpp> 
  +<src/stations/StationRegistry.cpp>

build_flags =
  -I ${PROJECT_DIR}/src 
  -I ${PROJECT_DIR}/src/stations
  ;-I .pio/libdeps/m5stack_tab5/LovyanGFX/src
  -I include
  -DBOARD_HAS_PSRAM
  -DCORE_DEBUG_LEVEL=0
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DARDUINO_USB_MODE=1
  -DLVGL_VERSION_MAJOR=9
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_CONF_SKIP
  -DLV_FONT_MONTSERRAT_20=1
  -DLV_FONT_MONTSERRAT_24=1
  -DLV_FONT_MONTSERRAT_28=1
  -DLV_FONT_MONTSERRAT_32=1



lib_deps =
  m5stack/M5Unified @ ^0.2.13
  m5stack/M5GFX @ ^0.2.19
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1
  lvgl/lvgl @ ~9.5.0


