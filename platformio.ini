; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Library source:  src/
; Example sketch:  examples/BelleIle/main.cpp

[platformio]
src_dir = .

[env]
platform  = espressif32
board     = esp32dev
framework = arduino

; Compile the chosen example + the library sources.
; Paths are relative to src_dir (project root).
build_src_filter = +<examples/BelleIle/main.cpp> +<src/*.cpp> +<src/stations/*.cpp>
build_flags      = -I src -I src/stations

lib_deps =
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1

[env:esp_wroom_02-usb]

[env:esp_wroom_02-ota]
upload_protocol = espota
upload_port     = 192.168.1.90
