; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html
;
; Library source:  src/
; Examples:        examples/BelleIle_minimal/BelleIle_minimal.ino  (no WiFi — default)
;                  examples/BelleIle_wifi/BelleIle_wifi.ino        (WiFi + NTP)
;
; To build the WiFi example, change src_dir below to:
;   src_dir = examples/BelleIle_wifi

[platformio]
src_dir = examples/BelleIle_minimal

[env]
platform    = espressif32
board       = esp32dev
framework   = arduino
; Pull library sources in relative to src_dir (examples/BelleIle_minimal → ../../src)
build_src_filter = +<*> +<../../src/*.cpp> +<../../src/stations/*.cpp>
build_flags      = -I ${PROJECT_DIR}/src -I ${PROJECT_DIR}/src/stations

lib_deps =
  arduino-libraries/NTPClient @ ^3.2.1
  paulstoffregen/Time @ ^1.6.1

; ── Minimal example (no WiFi, static date) ──────────────────────────────────
[env:esp_wroom_02-usb]

; ── OTA upload ───────────────────────────────────────────────────────────────
[env:esp_wroom_02-ota]
upload_protocol = espota
upload_port     = 192.168.1.90
