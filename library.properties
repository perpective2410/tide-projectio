author=Florent Valdelievre <florentvaldelievre@gmail.com>
maintainer=Florent Valdelievre <florentvaldelievre@gmail.com>
sentence=Harmonic tidal prediction (high/low tide times and heights) for ESP32.
paragraph=Predicts tidal events using classical harmonic analysis (Doodson constituents). Station data is compiled into the firmware — no SD card or filesystem required. Includes built-in support for Le Palais (Belle-Île-en-Mer) and Brest, with French tide coefficients calculated from the Brest reference station. New stations can be added by creating a single .cpp file.
